<!DOCTYPE html>
<html>

<head>
	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-ME8M5G343E"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag() { dataLayer.push(arguments); }
		gtag('js', new Date());

		gtag('config', 'G-ME8M5G343E');
	</script>
	<meta charset="utf-8">
	<title>太鼓ウェブ - Taiko Web</title>
	<link rel="icon" href="{{config.assets_baseurl}}img/favicon.png" type="image/png">
	<meta name="viewport" content="width=device-width, user-scalable=no">
	<meta name="description"
		content="パソコンとスマホのブラウザ向けの太鼓の達人シミュレータ 🥁 Taiko no Tatsujin rhythm game simulator for desktop and mobile browsers">
	<meta name="keywords"
		content="taiko no tatsujin, taiko, don chan, online, rhythm, browser, html5, game, for browsers, pc, arcade, emulator, free, download, website, 太鼓の達人, 太鼓ウェブ, 太鼓之達人, 太鼓達人, 太鼓网页, 网页版, 太鼓網頁, 網頁版, 태고의 달인, 태고 웹">
	<meta name="color-scheme" content="only light">
	<meta name="robots" content="noindex">

	<link rel="stylesheet" href="/src/css/loader.css?{{version.commit_short}}">

	<script src="/src/js/assets.js?{{version.commit_short}}"></script>
	<script src="/src/js/strings.js?{{version.commit_short}}"></script>
	<script src="/src/js/pageevents.js?{{version.commit_short}}"></script>
	<script src="/src/js/loader.js?{{version.commit_short}}"></script>

</head>

<body>
	<div id="assets"></div>
	<div id="screen" class="pattern-bg"></div>
	<div data-nosnippet id="version">
		{% if version.version and version.commit_short and version.commit %}
		<a href="{{version.url}}commit/{{version.commit}}" target="_blank" id="version-link" class="stroke-sub"
			alt="taiko-web ver.26.6.17 (2P TJA, synced options, 2P UI fixes)">taiko-web ver.26.6.17</a>
		{% else %}
		<a href="{{version.url}}" target="_blank" rel="noopener" id="version-link" class="stroke-sub"
			alt="taiko-web ver.26.6.17 (2P TJA, synced options, 2P UI fixes)">taiko-web ver.26.6.17</a>
		{% endif %}
	</div>
	<script src="/src/js/browsersupport.js?{{version.commit_short}}"></script>
	<script src="/src/js/main.js?{{version.commit_short}}"></script>
	<noscript>
		<div data-nosnippet id="unsupportedBrowser">
			<div id="unsupportedWarn">!</div>
			<span>太鼓ウェブはJavaScriptを有効にする必要があります。<br>Taiko Web requires JavaScript to be enabled in the browser.</span>
		</div>
	</noscript>
</body>

</html>
